spring:
  datasource:
    url: jdbc:mysql://localhost:3306/house_auction_db
    username: your_mysql_username
    password: your_mysql_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt-secret: "replace_with_long_random_base64_secret"
  jwt-expiration: 86400000
  otp-expiry-minutes: 5
  admin-email: admin@example.com

file:
  upload-dir: uploads

server:
  port: 8081
